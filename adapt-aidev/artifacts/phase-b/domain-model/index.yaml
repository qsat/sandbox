    - "PRGパターン: POST後は必ず redirect:/ プレフィックスで返す"
    - "バリデーション: @Execute(validator=true, input=\"失敗時のJSP\") でバリデーション有効化"
    - "セッション取得: (User) request.getSession().getAttribute(\"loginUser\")"
