  pattern_notes:
    - "SAStruts リダイレクト: return \"redirect:/path\" （URLプレフィックス）"
    - "SAStruts フォワード: return \"view.jsp\" （ビューパス）"
    - "S2JDBC getSingleResult(): 結果0件でnullを返す（例外なし）"
